<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Space</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --cream: #FAF6F0; --parchment: #F2EBE0; --warm-brown: #8B6347;
  --deep-brown: #5C3D2E; --rust: #C4714A; --sage: #7A8C6E;
  --muted-gold: #C9A84C; --text-dark: #3B2A1E; --text-mid: #6B4F3A;
  --text-light: #9B7B62; --border: rgba(139,99,71,0.18);
  --card-bg: #FFFDF9; --shadow: 0 2px 16px rgba(92,61,46,0.08);
}
body { font-family:'Nunito',sans-serif; background-color:var(--cream); color:var(--text-dark); min-height:100vh;
  background-image: radial-gradient(ellipse at 20% 10%,rgba(201,168,76,0.08) 0%,transparent 50%),
    radial-gradient(ellipse at 80% 80%,rgba(196,113,74,0.07) 0%,transparent 50%); }
header { background:var(--deep-brown); color:#FAF6F0; padding:1.5rem 2rem; display:flex; align-items:center;
  justify-content:space-between; box-shadow:0 2px 12px rgba(92,61,46,0.18); }
header h1 { font-family:'Lora',serif; font-size:1.6rem; font-weight:600; letter-spacing:0.02em; }
header span { font-size:0.85rem; opacity:0.65; font-family:'Nunito',sans-serif; }
nav { background:var(--parchment); border-bottom:1px solid var(--border); display:flex; gap:0; overflow-x:auto;
  box-shadow:0 1px 4px rgba(92,61,46,0.06); }
nav button { background:none; border:none; padding:0.85rem 1.5rem; font-family:'Nunito',sans-serif;
  font-size:0.9rem; font-weight:600; color:var(--text-mid); cursor:pointer;
  border-bottom:3px solid transparent; transition:all 0.2s; white-space:nowrap; display:flex; align-items:center; gap:6px; }
nav button:hover { color:var(--rust); background:rgba(196,113,74,0.06); }
nav button.active { color:var(--rust); border-bottom-color:var(--rust); background:rgba(196,113,74,0.07); }
.container { max-width:960px; margin:0 auto; padding:2rem 1.25rem; }
.section { display:none; } .section.active { display:block; }
.section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:1.5rem; }
.section-title { font-family:'Lora',serif; font-size:1.4rem; font-weight:600; color:var(--deep-brown); }
.btn-add { background:var(--rust); color:white; border:none; padding:0.5rem 1.1rem; border-radius:20px;
  font-family:'Nunito',sans-serif; font-size:0.85rem; font-weight:600; cursor:pointer;
  transition:background 0.2s,transform 0.1s; display:flex; align-items:center; gap:5px; }
.btn-add:hover { background:var(--deep-brown); transform:translateY(-1px); }

/* NOTES */
.notes-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:1rem; }
.note-card { background:var(--card-bg); border:1px solid var(--border); border-radius:12px;
  padding:1.1rem 1.2rem; box-shadow:var(--shadow); position:relative; transition:transform 0.15s; }
.note-card:hover { transform:translateY(-2px); }
.note-card .note-date { font-size:0.72rem; color:var(--text-light); margin-bottom:0.4rem; font-style:italic; }
.note-card .note-title { font-family:'Lora',serif; font-size:1rem; font-weight:600; color:var(--deep-brown); margin-bottom:0.4rem; }
.note-card .note-body { font-size:0.87rem; color:var(--text-mid); line-height:1.6; white-space:pre-wrap; }
.note-card .tag { display:inline-block; margin-top:0.6rem; padding:2px 9px; border-radius:10px; font-size:0.72rem; font-weight:600; }
.tag-note { background:#EEF3E8; color:#4A6B35; } .tag-reflection { background:#F3EAE0; color:#8B5A30; } .tag-idea { background:#EDE8F6; color:#5A3F8B; }
.card-actions { position:absolute; top:0.7rem; right:0.8rem; display:flex; gap:4px; opacity:0; transition:opacity 0.2s; }
.note-card:hover .card-actions, .list-item:hover .card-actions, .todo-item:hover .card-actions { opacity:1; }
.card-actions button { background:none; border:1px solid var(--border); border-radius:6px; width:26px; height:26px;
  cursor:pointer; font-size:0.75rem; display:flex; align-items:center; justify-content:center;
  color:var(--text-light); background:var(--card-bg); transition:all 0.15s; }
.card-actions button:hover { background:#FDE8E0; color:var(--rust); border-color:var(--rust); }

/* BOOKS */
.list-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:1rem; }
.list-item { background:var(--card-bg); border:1px solid var(--border); border-radius:12px; padding:1rem;
  box-shadow:var(--shadow); position:relative; transition:transform 0.15s; }
.list-item:hover { transform:translateY(-2px); }
.list-item .item-emoji { font-size:2rem; margin-bottom:0.5rem; display:block; }
.list-item .item-title { font-family:'Lora',serif; font-size:0.95rem; font-weight:600; color:var(--deep-brown); margin-bottom:0.2rem; line-height:1.3; }
.list-item .item-sub { font-size:0.78rem; color:var(--text-light); margin-bottom:0.4rem; }
.stars { color:var(--muted-gold); font-size:0.85rem; letter-spacing:1px; }
.status-badge { display:inline-block; padding:2px 8px; border-radius:8px; font-size:0.7rem; font-weight:600; margin-top:0.4rem; }
.status-reading,.status-watching { background:#FFF3E0; color:#B06000; }
.status-done { background:#E8F5E9; color:#2E7D32; }
.status-want { background:#E8EAF6; color:#3949AB; }

/* MOVIES — poster card style */
.movies-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:1.2rem; }
.movie-card { background:var(--card-bg); border:1px solid var(--border); border-radius:14px;
  box-shadow:var(--shadow); position:relative; transition:transform 0.2s,box-shadow 0.2s;
  overflow:hidden; cursor:pointer; }
.movie-card:hover { transform:translateY(-4px); box-shadow:0 8px 32px rgba(92,61,46,0.16); }
.movie-poster { width:100%; aspect-ratio:2/3; object-fit:cover; display:block; background:#E8DDD4; }
.movie-poster-placeholder { width:100%; aspect-ratio:2/3; display:flex; align-items:center; justify-content:center;
  background:linear-gradient(135deg,#F2EBE0,#E8DDD4); font-size:3rem; }
.movie-info { padding:0.75rem 0.8rem 0.85rem; }
.movie-title { font-family:'Lora',serif; font-size:0.88rem; font-weight:600; color:var(--deep-brown);
  line-height:1.3; margin-bottom:0.3rem; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.movie-genre { font-size:0.72rem; color:var(--text-light); margin-bottom:0.35rem;
  display:-webkit-box; -webkit-line-clamp:1; -webkit-box-orient:vertical; overflow:hidden; }
.movie-card .card-actions { top:0.5rem; right:0.5rem; opacity:0; }
.movie-card:hover .card-actions { opacity:1; }
.movie-card .card-actions button { background:rgba(255,253,249,0.92); backdrop-filter:blur(4px); }
.movie-loading { grid-column:1/-1; text-align:center; padding:3rem; color:var(--text-light); font-style:italic; }

/* TODOS */
.todo-list { display:flex; flex-direction:column; gap:0.6rem; }
.todo-item { background:var(--card-bg); border:1px solid var(--border); border-radius:10px;
  padding:0.85rem 1.1rem; display:flex; align-items:center; gap:0.8rem;
  box-shadow:var(--shadow); position:relative; transition:transform 0.15s; }
.todo-item:hover { transform:translateX(3px); }
.todo-item input[type="checkbox"] { width:18px; height:18px; accent-color:var(--sage); cursor:pointer; flex-shrink:0; }
.todo-item .todo-text { flex:1; font-size:0.92rem; color:var(--text-dark); line-height:1.4; }
.todo-item.done .todo-text { text-decoration:line-through; color:var(--text-light); }
.todo-priority { font-size:0.7rem; font-weight:600; padding:2px 7px; border-radius:8px; }
.priority-high { background:#FDE8E0; color:#C0392B; } .priority-med { background:#FFF8E1; color:#B07800; } .priority-low { background:#E8F5E9; color:#2E7D32; }
.todo-category { font-size:0.7rem; color:var(--text-light); font-style:italic; }

/* MODAL */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(60,35,20,0.45); z-index:100;
  align-items:center; justify-content:center; padding:1rem; }
.modal-overlay.open { display:flex; }
.modal { background:var(--cream); border-radius:16px; padding:1.75rem; width:100%; max-width:480px;
  box-shadow:0 8px 40px rgba(92,61,46,0.22); animation:modalIn 0.2s ease; max-height:90vh; overflow-y:auto; }
@keyframes modalIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
.modal h2 { font-family:'Lora',serif; font-size:1.2rem; font-weight:600; color:var(--deep-brown); margin-bottom:1.2rem; }
.form-group { margin-bottom:1rem; }
.form-group label { display:block; font-size:0.82rem; font-weight:600; color:var(--text-mid); margin-bottom:0.3rem; }
.form-group input, .form-group textarea, .form-group select {
  width:100%; border:1px solid var(--border); border-radius:8px; padding:0.55rem 0.8rem;
  font-family:'Nunito',sans-serif; font-size:0.9rem; background:var(--card-bg);
  color:var(--text-dark); outline:none; transition:border-color 0.2s; }
.form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color:var(--warm-brown); }
.form-group textarea { resize:vertical; min-height:90px; line-height:1.5; }
.modal-actions { display:flex; gap:0.7rem; justify-content:flex-end; margin-top:1.3rem; }
.btn-cancel { background:none; border:1px solid var(--border); color:var(--text-mid); padding:0.5rem 1.1rem;
  border-radius:20px; font-family:'Nunito',sans-serif; font-size:0.85rem; font-weight:600; cursor:pointer; transition:all 0.15s; }
.btn-cancel:hover { background:var(--parchment); }
.btn-save { background:var(--deep-brown); color:white; border:none; padding:0.5rem 1.3rem; border-radius:20px;
  font-family:'Nunito',sans-serif; font-size:0.85rem; font-weight:600; cursor:pointer; transition:background 0.15s; }
.btn-save:hover { background:var(--rust); }
.btn-save:disabled { opacity:0.6; cursor:not-allowed; }
.empty-state { text-align:center; padding:3rem 1rem; color:var(--text-light); font-family:'Lora',serif; font-style:italic; font-size:1rem; }
.empty-state span { font-size:2rem; display:block; margin-bottom:0.6rem; opacity:0.5; }
.filter-row { display:flex; gap:0.5rem; margin-bottom:1.2rem; flex-wrap:wrap; align-items:center; }
.filter-btn { background:var(--parchment); border:1px solid var(--border); border-radius:14px; padding:0.3rem 0.9rem;
  font-size:0.78rem; font-weight:600; color:var(--text-mid); cursor:pointer; transition:all 0.15s; }
.filter-btn:hover,.filter-btn.active { background:var(--rust); color:white; border-color:var(--rust); }
.stats-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(110px,1fr)); gap:0.8rem; margin-bottom:1.5rem; }
.stat-card { background:var(--parchment); border-radius:10px; padding:0.8rem 1rem; text-align:center; border:1px solid var(--border); }
.stat-card .stat-num { font-family:'Lora',serif; font-size:1.5rem; font-weight:600; color:var(--rust); display:block; }
.stat-card .stat-label { font-size:0.72rem; color:var(--text-light); font-weight:600; text-transform:uppercase; letter-spacing:0.05em; }

/* Movie search suggestions */
.tmdb-suggestions { border:1px solid var(--border); border-radius:8px; background:var(--card-bg);
  margin-top:0.3rem; max-height:200px; overflow-y:auto; display:none; box-shadow:var(--shadow); }
.tmdb-suggestion { display:flex; align-items:center; gap:0.75rem; padding:0.6rem 0.8rem;
  cursor:pointer; border-bottom:1px solid var(--border); transition:background 0.15s; }
.tmdb-suggestion:last-child { border-bottom:none; }
.tmdb-suggestion:hover { background:var(--parchment); }
.tmdb-thumb { width:36px; height:54px; object-fit:cover; border-radius:4px; background:#E8DDD4; flex-shrink:0; }
.tmdb-suggestion-info { flex:1; }
.tmdb-suggestion-title { font-size:0.85rem; font-weight:600; color:var(--deep-brown); }
.tmdb-suggestion-year { font-size:0.75rem; color:var(--text-light); }

/* Notion sync status */
.sync-badge { display:inline-flex; align-items:center; gap:5px; font-size:0.72rem;
  color:var(--text-light); background:var(--parchment); border:1px solid var(--border);
  padding:0.2rem 0.7rem; border-radius:10px; margin-left:auto; }
.sync-dot { width:7px; height:7px; border-radius:50%; background:var(--sage); }
.sync-dot.syncing { background:var(--muted-gold); animation:pulse 1s infinite; }
.sync-dot.error { background:var(--rust); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* Movie detail modal */
.movie-detail { display:flex; gap:1.2rem; }
.movie-detail-poster { width:120px; flex-shrink:0; border-radius:8px; overflow:hidden; }
.movie-detail-poster img { width:100%; display:block; }
.movie-detail-poster-placeholder { width:120px; height:180px; background:#E8DDD4; border-radius:8px;
  display:flex; align-items:center; justify-content:center; font-size:2.5rem; }
.movie-detail-body { flex:1; }
</style>
</head>
<body>
<header>
  <h1>✦ My Space</h1>
  <span id="header-date"></span>
</header>
<nav>
  <button class="active" onclick="switchTab('notes',this)">📝 Notes</button>
  <button onclick="switchTab('books',this)">📚 Books</button>
  <button onclick="switchTab('movies',this)">🎬 Movies</button>
  <button onclick="switchTab('todos',this)">✅ Goals</button>
</nav>
<div class="container">

  <!-- NOTES -->
  <div id="notes" class="section active">
    <div class="section-header">
      <h2 class="section-title">Notes & Reflections</h2>
      <button class="btn-add" onclick="openModal('note')">+ New Note</button>
    </div>
    <div class="filter-row">
      <button class="filter-btn active" onclick="filterNotes('all',this)">All</button>
      <button class="filter-btn" onclick="filterNotes('note',this)">Notes</button>
      <button class="filter-btn" onclick="filterNotes('reflection',this)">Reflections</button>
      <button class="filter-btn" onclick="filterNotes('idea',this)">Ideas</button>
    </div>
    <div class="notes-grid" id="notes-container"></div>
  </div>

  <!-- BOOKS -->
  <div id="books" class="section">
    <div class="section-header">
      <h2 class="section-title">Book List</h2>
      <button class="btn-add" onclick="openModal('book')">+ Add Book</button>
    </div>
    <div class="filter-row">
      <button class="filter-btn active" onclick="filterList('books','all',this)">All</button>
      <button class="filter-btn" onclick="filterList('books','want',this)">Want to Read</button>
      <button class="filter-btn" onclick="filterList('books','reading',this)">Reading</button>
      <button class="filter-btn" onclick="filterList('books','done',this)">Done</button>
    </div>
    <div class="list-grid" id="books-container"></div>
  </div>

  <!-- MOVIES -->
  <div id="movies" class="section">
    <div class="section-header">
      <h2 class="section-title">Movie List</h2>
      <div style="display:flex;align-items:center;gap:0.8rem;">
        <span class="sync-badge" id="sync-badge"><span class="sync-dot" id="sync-dot"></span><span id="sync-text">Notion</span></span>
        <button class="btn-add" onclick="openModal('movie')">+ Add Movie</button>
      </div>
    </div>
    <div class="filter-row">
      <button class="filter-btn active" onclick="filterMovies('all',this)">All</button>
      <button class="filter-btn" onclick="filterMovies('want',this)">Watchlist</button>
      <button class="filter-btn" onclick="filterMovies('watching',this)">Watching</button>
      <button class="filter-btn" onclick="filterMovies('done',this)">Watched</button>
    </div>
    <div class="movies-grid" id="movies-container">
      <div class="movie-loading">Loading movies from Notion…</div>
    </div>
  </div>

  <!-- TODOS -->
  <div id="todos" class="section">
    <div class="section-header">
      <h2 class="section-title">Goals & To-Dos</h2>
      <button class="btn-add" onclick="openModal('todo')">+ Add Goal</button>
    </div>
    <div class="stats-row" id="todo-stats"></div>
    <div class="filter-row">
      <button class="filter-btn active" onclick="filterTodos('all',this)">All</button>
      <button class="filter-btn" onclick="filterTodos('active',this)">Active</button>
      <button class="filter-btn" onclick="filterTodos('done',this)">Done</button>
    </div>
    <div class="todo-list" id="todos-container"></div>
  </div>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModalOutside(event)">
  <div class="modal" id="modal-box"></div>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const NOTION_DS = 'collection://6492d784-b347-41db-872b-d3ad7cd040ca';
// Get your free TMDB API key at https://www.themoviedb.org/settings/api
// Then replace YOUR_TMDB_API_KEY below with your actual key
const TMDB_KEY  = '6d4eadcc28b80091ca3172c8d9f824e4';
const TMDB_IMG  = 'https://image.tmdb.org/t/p/w342';

// ─── LOCAL STATE (notes, books, todos stay local) ─────────────────────────────
const state = {
  notes:  JSON.parse(localStorage.getItem('myspace_notes')  || '[]'),
  books:  JSON.parse(localStorage.getItem('myspace_books')  || '[]'),
  todos:  JSON.parse(localStorage.getItem('myspace_todos')  || '[]'),
  movies: [],
};

let editId = null, currentType = null;
let noteFilter = 'all', bookFilter = 'all', movieFilter = 'all', todoFilter = 'all';
let tmdbResults = [], selectedTmdb = null;

function saveLocal(key) { localStorage.setItem('myspace_' + key, JSON.stringify(state[key])); }

// ─── NOTION MOVIES API ────────────────────────────────────────────────────────
function setSyncStatus(status) {
  const dot = document.getElementById('sync-dot');
  const txt = document.getElementById('sync-text');
  dot.className = 'sync-dot' + (status === 'syncing' ? ' syncing' : status === 'error' ? ' error' : '');
  txt.textContent = status === 'syncing' ? 'Syncing…' : status === 'error' ? 'Sync error' : 'Notion ✓';
}

async function callClaude(prompt) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      mcp_servers: [{ type: 'url', url: 'https://mcp.notion.com/mcp', name: 'notion-mcp' }],
      messages: [{ role: 'user', content: prompt }]
    })
  });
  const data = await res.json();
  return data;
}

async function loadMoviesFromNotion() {
  setSyncStatus('syncing');
  try {
    const data = await callClaude(
      `Fetch the Notion data source at URL "${NOTION_DS}" and return ALL movies as a JSON array. ` +
      `Each object must have: id (the Notion page URL as string), title, genre (from Genre field), ` +
      `status (want/watching/done), rating (number 0-5), notes, poster (URL string). ` +
      `Return ONLY a valid JSON array, no markdown, no extra text.`
    );
    // Extract text from response
    const textBlock = data.content?.find(b => b.type === 'text');
    const raw = textBlock?.text || '[]';
    const clean = raw.replace(/```json|```/g, '').trim();
    const movies = JSON.parse(clean);
    state.movies = Array.isArray(movies) ? movies : [];
    setSyncStatus('ok');
    renderMovies();
  } catch (e) {
    console.error('Notion load error:', e);
    setSyncStatus('error');
    document.getElementById('movies-container').innerHTML =
      '<div class="movie-loading">Could not load from Notion. Check your connection.</div>';
  }
}

async function saveMovieToNotion(movie) {
  setSyncStatus('syncing');
  try {
    const prompt = `Add a new movie to the Notion data source "${NOTION_DS}" with these properties:
Title: "${movie.title}"
Genre: "${movie.genre || ''}"
Status: "${movie.status}"
Rating: ${movie.rating || 0}
Notes: "${movie.notes || ''}"
Poster: "${movie.poster || ''}"
TMDB_ID: "${movie.tmdbId || ''}"
Confirm done with just "saved".`;
    await callClaude(prompt);
    setSyncStatus('ok');
    await loadMoviesFromNotion();
  } catch(e) {
    console.error('Save error:', e);
    setSyncStatus('error');
  }
}

async function updateMovieInNotion(notionId, movie) {
  setSyncStatus('syncing');
  try {
    const prompt = `Update the Notion page at URL "${notionId}" with these new values:
Title: "${movie.title}"
Genre: "${movie.genre || ''}"
Status: "${movie.status}"
Rating: ${movie.rating || 0}
Notes: "${movie.notes || ''}"
Poster: "${movie.poster || ''}"
Confirm with just "updated".`;
    await callClaude(prompt);
    setSyncStatus('ok');
    await loadMoviesFromNotion();
  } catch(e) {
    setSyncStatus('error');
  }
}

async function deleteMovieFromNotion(notionId) {
  setSyncStatus('syncing');
  try {
    const prompt = `Archive/delete the Notion page at URL "${notionId}". Confirm with "deleted".`;
    await callClaude(prompt);
    setSyncStatus('ok');
    await loadMoviesFromNotion();
  } catch(e) {
    setSyncStatus('error');
  }
}

// ─── TMDB SEARCH ──────────────────────────────────────────────────────────────
let tmdbTimer;
async function searchTMDB(query) {
  if (!query || query.length < 2) { hideSuggestions(); return; }
  clearTimeout(tmdbTimer);
  tmdbTimer = setTimeout(async () => {
    try {
      const url = `https://api.themoviedb.org/3/search/movie?api_key=${TMDB_KEY}&query=${encodeURIComponent(query)}&page=1`;
      const res = await fetch(url);
      const data = await res.json();
      tmdbResults = (data.results || []).slice(0, 5);
      showSuggestions();
    } catch(e) { hideSuggestions(); }
  }, 400);
}

function showSuggestions() {
  const box = document.getElementById('tmdb-suggestions');
  if (!box || !tmdbResults.length) { hideSuggestions(); return; }
  box.style.display = 'block';
  box.innerHTML = tmdbResults.map((m, i) => `
    <div class="tmdb-suggestion" onclick="selectTmdb(${i})">
      ${m.poster_path
        ? `<img class="tmdb-thumb" src="${TMDB_IMG}${m.poster_path}" alt="">`
        : `<div style="width:36px;height:54px;background:#E8DDD4;border-radius:4px;display:flex;align-items:center;justify-content:center;">🎞</div>`}
      <div class="tmdb-suggestion-info">
        <div class="tmdb-suggestion-title">${m.title}</div>
        <div class="tmdb-suggestion-year">${(m.release_date || '').slice(0,4)}</div>
      </div>
    </div>`).join('');
}

function hideSuggestions() {
  const box = document.getElementById('tmdb-suggestions');
  if (box) box.style.display = 'none';
}

function selectTmdb(idx) {
  selectedTmdb = tmdbResults[idx];
  const m = selectedTmdb;
  document.getElementById('f-title').value = m.title;
  // Get genre names from genre_ids (common mapping)
  const genreMap = {28:'Action',12:'Adventure',16:'Animation',35:'Comedy',80:'Crime',99:'Documentary',
    18:'Drama',10751:'Family',14:'Fantasy',36:'History',27:'Horror',10402:'Music',9648:'Mystery',
    10749:'Romance',878:'Sci-Fi',10770:'TV Movie',53:'Thriller',10752:'War',37:'Western'};
  const genres = (m.genre_ids || []).map(id => genreMap[id] || '').filter(Boolean).slice(0,2).join(', ');
  document.getElementById('f-genre').value = genres || '';
  // Show poster preview
  const preview = document.getElementById('poster-preview');
  if (preview && m.poster_path) {
    preview.src = TMDB_IMG + m.poster_path;
    preview.style.display = 'block';
  }
  hideSuggestions();
}

// ─── MODAL ────────────────────────────────────────────────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById(name).classList.add('active');
  btn.classList.add('active');
  if (name === 'movies' && !state.movies.length) loadMoviesFromNotion();
  else render();
}

function openModal(type, id) {
  currentType = type; editId = id || null;
  selectedTmdb = null; tmdbResults = [];
  const overlay = document.getElementById('modal-overlay');
  const box = document.getElementById('modal-box');
  box.innerHTML = buildForm(type, id);
  overlay.classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  editId = null; currentType = null; selectedTmdb = null;
}

function closeModalOutside(e) { if (e.target === document.getElementById('modal-overlay')) closeModal(); }

function buildForm(type, id) {
  if (type === 'note') {
    const item = id ? state.notes.find(n => n.id === id) : {};
    return `<h2>${id ? 'Edit' : 'New'} Note</h2>
      <div class="form-group"><label>Title</label><input id="f-title" value="${item.title||''}" placeholder="Give it a title..."></div>
      <div class="form-group"><label>Content</label><textarea id="f-body" placeholder="Write your thoughts...">${item.body||''}</textarea></div>
      <div class="form-group"><label>Type</label><select id="f-type">
        <option value="note" ${item.type==='note'?'selected':''}>Note</option>
        <option value="reflection" ${item.type==='reflection'?'selected':''}>Reflection</option>
        <option value="idea" ${item.type==='idea'?'selected':''}>Idea</option>
      </select></div>
      <div class="modal-actions"><button class="btn-cancel" onclick="closeModal()">Cancel</button><button class="btn-save" onclick="saveNote()">Save</button></div>`;
  }
  if (type === 'book') {
    const item = id ? state.books.find(n => n.id === id) : {};
    return `<h2>${id ? 'Edit' : 'Add'} Book</h2>
      <div class="form-group"><label>Title</label><input id="f-title" value="${item.title||''}" placeholder="Book title..."></div>
      <div class="form-group"><label>Author</label><input id="f-author" value="${item.author||''}" placeholder="Author name..."></div>
      <div class="form-group"><label>Status</label><select id="f-status">
        <option value="want" ${item.status==='want'?'selected':''}>Want to Read</option>
        <option value="reading" ${item.status==='reading'?'selected':''}>Reading</option>
        <option value="done" ${item.status==='done'?'selected':''}>Done</option>
      </select></div>
      <div class="form-group"><label>Rating (1–5)</label><input id="f-rating" type="number" min="1" max="5" value="${item.rating||''}" placeholder="e.g. 4"></div>
      <div class="form-group"><label>Notes</label><textarea id="f-notes" placeholder="Thoughts on this book...">${item.notes||''}</textarea></div>
      <div class="modal-actions"><button class="btn-cancel" onclick="closeModal()">Cancel</button><button class="btn-save" onclick="saveItem('book')">Save</button></div>`;
  }
  if (type === 'movie') {
    const item = id ? state.movies.find(n => n.id === id) : {};
    const posterUrl = item.poster || '';
    return `<h2>${id ? 'Edit' : 'Add'} Movie</h2>
      <div class="form-group">
        <label>Search Movie Title</label>
        <input id="f-title" value="${item.title||''}" placeholder="Start typing to search…" oninput="searchTMDB(this.value)" autocomplete="off">
        <div id="tmdb-suggestions" class="tmdb-suggestions"></div>
      </div>
      ${posterUrl ? `<img id="poster-preview" src="${posterUrl}" style="width:80px;border-radius:6px;margin-bottom:0.8rem;display:block;">` : `<img id="poster-preview" src="" style="width:80px;border-radius:6px;margin-bottom:0.8rem;display:none;">`}
      <div class="form-group"><label>Genre / Director</label><input id="f-genre" value="${item.genre||''}" placeholder="e.g. Drama, Sci-Fi…"></div>
      <div class="form-group"><label>Status</label><select id="f-status">
        <option value="want" ${item.status==='want'?'selected':''}>Watchlist</option>
        <option value="watching" ${item.status==='watching'?'selected':''}>Watching</option>
        <option value="done" ${item.status==='done'?'selected':''}>Watched</option>
      </select></div>
      <div class="form-group"><label>Rating (1–5)</label><input id="f-rating" type="number" min="1" max="5" value="${item.rating||''}" placeholder="e.g. 4"></div>
      <div class="form-group"><label>Notes</label><textarea id="f-notes" placeholder="Quick thoughts...">${item.notes||''}</textarea></div>
      <div class="modal-actions"><button class="btn-cancel" onclick="closeModal()">Cancel</button><button class="btn-save" id="movie-save-btn" onclick="saveMovie()">Save to Notion</button></div>`;
  }
  if (type === 'todo') {
    const item = id ? state.todos.find(n => n.id === id) : {};
    return `<h2>${id ? 'Edit' : 'New'} Goal</h2>
      <div class="form-group"><label>Goal / Task</label><input id="f-title" value="${item.title||''}" placeholder="What do you want to accomplish?"></div>
      <div class="form-group"><label>Category</label><input id="f-cat" value="${item.category||''}" placeholder="e.g. Work, Health, Personal..."></div>
      <div class="form-group"><label>Priority</label><select id="f-priority">
        <option value="high" ${item.priority==='high'?'selected':''}>High</option>
        <option value="med" ${item.priority==='med'?'selected':''}>Medium</option>
        <option value="low" ${item.priority==='low'?'selected':''}>Low</option>
      </select></div>
      <div class="modal-actions"><button class="btn-cancel" onclick="closeModal()">Cancel</button><button class="btn-save" onclick="saveTodo()">Save</button></div>`;
  }
}

// ─── SAVE FUNCTIONS ───────────────────────────────────────────────────────────
function saveNote() {
  const title = document.getElementById('f-title').value.trim();
  const body  = document.getElementById('f-body').value.trim();
  const type  = document.getElementById('f-type').value;
  if (!title) return;
  if (editId) {
    const idx = state.notes.findIndex(n => n.id === editId);
    state.notes[idx] = { ...state.notes[idx], title, body, type };
  } else {
    state.notes.unshift({ id: Date.now().toString(), title, body, type,
      date: new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) });
  }
  saveLocal('notes'); closeModal(); renderNotes();
}

function saveItem(cat) {
  const title  = document.getElementById('f-title').value.trim();
  const author = document.getElementById('f-author').value.trim();
  const status = document.getElementById('f-status').value;
  const rating = parseInt(document.getElementById('f-rating').value) || 0;
  const notes  = document.getElementById('f-notes').value.trim();
  if (!title) return;
  const arr = state[cat + 's'];
  if (editId) {
    const idx = arr.findIndex(n => n.id === editId);
    arr[idx] = { ...arr[idx], title, author, status, rating, notes };
  } else {
    arr.unshift({ id: Date.now().toString(), title, author, status, rating, notes });
  }
  saveLocal(cat + 's'); closeModal();
  cat === 'book' ? renderBooks() : renderMovies();
}

async function saveMovie() {
  const title  = document.getElementById('f-title').value.trim();
  const genre  = document.getElementById('f-genre').value.trim();
  const status = document.getElementById('f-status').value;
  const rating = parseInt(document.getElementById('f-rating').value) || 0;
  const notes  = document.getElementById('f-notes').value.trim();
  if (!title) return;

  const btn = document.getElementById('movie-save-btn');
  btn.disabled = true; btn.textContent = 'Saving…';

  let poster = '';
  let tmdbId = '';
  if (selectedTmdb && selectedTmdb.poster_path) {
    poster = `https://image.tmdb.org/t/p/w500${selectedTmdb.poster_path}`;
    tmdbId = String(selectedTmdb.id);
  } else if (editId) {
    const existing = state.movies.find(m => m.id === editId);
    if (existing) { poster = existing.poster || ''; tmdbId = existing.tmdbId || ''; }
  }

  const movie = { title, genre, status, rating, notes, poster, tmdbId };

  if (editId) {
    await updateMovieInNotion(editId, movie);
  } else {
    await saveMovieToNotion(movie);
  }
  closeModal();
}

function saveTodo() {
  const title    = document.getElementById('f-title').value.trim();
  const category = document.getElementById('f-cat').value.trim();
  const priority = document.getElementById('f-priority').value;
  if (!title) return;
  if (editId) {
    const idx = state.todos.findIndex(n => n.id === editId);
    state.todos[idx] = { ...state.todos[idx], title, category, priority };
  } else {
    state.todos.unshift({ id: Date.now().toString(), title, category, priority, done: false });
  }
  saveLocal('todos'); closeModal(); renderTodos();
}

function deleteItem(arr, id, saveKey, renderFn) {
  const idx = state[arr].findIndex(n => n.id === id);
  state[arr].splice(idx, 1); saveLocal(saveKey); renderFn();
}

function toggleTodo(id) {
  const item = state.todos.find(t => t.id === id);
  if (item) { item.done = !item.done; saveLocal('todos'); renderTodos(); }
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function starsHTML(n) {
  if (!n) return '';
  return '<div class="stars">' + '★'.repeat(n) + '☆'.repeat(5-n) + '</div>';
}

function filterNotes(f, btn) {
  noteFilter = f;
  document.querySelectorAll('#notes .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active'); renderNotes();
}
function filterList(cat, f, btn) {
  if (cat === 'books') bookFilter = f;
  const el = document.getElementById(cat);
  el.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  cat === 'books' ? renderBooks() : renderMovies();
}
function filterMovies(f, btn) {
  movieFilter = f;
  document.querySelectorAll('#movies .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active'); renderMovies();
}
function filterTodos(f, btn) {
  todoFilter = f;
  document.querySelectorAll('#todos .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active'); renderTodos();
}

function renderNotes() {
  const c = document.getElementById('notes-container');
  const items = state.notes.filter(n => noteFilter === 'all' || n.type === noteFilter);
  if (!items.length) { c.innerHTML = '<div class="empty-state"><span>📝</span>No notes yet — add your first one!</div>'; return; }
  c.innerHTML = items.map(n => `
    <div class="note-card">
      <div class="card-actions">
        <button onclick="openModal('note','${n.id}')">✏</button>
        <button onclick="deleteItem('notes','${n.id}','notes',renderNotes)">✕</button>
      </div>
      <div class="note-date">${n.date||''}</div>
      <div class="note-title">${n.title}</div>
      <div class="note-body">${n.body}</div>
      <span class="tag tag-${n.type}">${n.type}</span>
    </div>`).join('');
}

function renderBooks() {
  const c = document.getElementById('books-container');
  const items = state.books.filter(b => bookFilter === 'all' || b.status === bookFilter);
  if (!items.length) { c.innerHTML = '<div class="empty-state"><span>📚</span>No books yet — add your first one!</div>'; return; }
  const statusLabel = {want:'Want to Read',reading:'Reading',done:'Done'};
  c.innerHTML = items.map(b => `
    <div class="list-item">
      <div class="card-actions">
        <button onclick="openModal('book','${b.id}')">✏</button>
        <button onclick="deleteItem('books','${b.id}','books',renderBooks)">✕</button>
      </div>
      <span class="item-emoji">📖</span>
      <div class="item-title">${b.title}</div>
      <div class="item-sub">${b.author||''}</div>
      ${starsHTML(b.rating)}
      <div><span class="status-badge status-${b.status}">${statusLabel[b.status]}</span></div>
      ${b.notes ? `<div class="item-sub" style="margin-top:0.4rem;font-style:italic;">${b.notes}</div>` : ''}
    </div>`).join('');
}

function renderMovies() {
  const c = document.getElementById('movies-container');
  const items = state.movies.filter(m => movieFilter === 'all' || m.status === movieFilter);
  if (!items.length) {
    c.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><span>🎬</span>No movies yet — add your first one!</div>';
    return;
  }
  const statusLabel = {want:'Watchlist',watching:'Watching',done:'Watched'};
  c.innerHTML = items.map(m => `
    <div class="movie-card" onclick="openModal('movie','${m.id}')">
      <div class="card-actions">
        <button onclick="event.stopPropagation();openModal('movie','${m.id}')">✏</button>
        <button onclick="event.stopPropagation();confirmDeleteMovie('${m.id}')">✕</button>
      </div>
      ${m.poster
        ? `<img class="movie-poster" src="${m.poster}" alt="${m.title}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
        : ''}
      <div class="movie-poster-placeholder" ${m.poster ? 'style="display:none"' : ''}>🎞</div>
      <div class="movie-info">
        <div class="movie-title">${m.title}</div>
        <div class="movie-genre">${m.genre||''}</div>
        ${starsHTML(m.rating)}
        <span class="status-badge status-${m.status}">${statusLabel[m.status]||m.status}</span>
      </div>
    </div>`).join('');
}

function confirmDeleteMovie(id) {
  if (confirm('Remove this movie from Notion?')) deleteMovieFromNotion(id);
}

function renderTodos() {
  const c = document.getElementById('todos-container');
  const stats = document.getElementById('todo-stats');
  const total = state.todos.length, done = state.todos.filter(t=>t.done).length;
  const high = state.todos.filter(t=>t.priority==='high'&&!t.done).length;
  stats.innerHTML = `
    <div class="stat-card"><span class="stat-num">${total}</span><span class="stat-label">Total</span></div>
    <div class="stat-card"><span class="stat-num">${done}</span><span class="stat-label">Done</span></div>
    <div class="stat-card"><span class="stat-num">${total-done}</span><span class="stat-label">Active</span></div>
    <div class="stat-card"><span class="stat-num">${high}</span><span class="stat-label">High Priority</span></div>`;
  const items = state.todos.filter(t => todoFilter==='active'?!t.done:todoFilter==='done'?t.done:true);
  if (!items.length) { c.innerHTML = '<div class="empty-state"><span>✅</span>Nothing here — add a goal!</div>'; return; }
  c.innerHTML = items.map(t => `
    <div class="todo-item ${t.done?'done':''}">
      <input type="checkbox" ${t.done?'checked':''} onchange="toggleTodo('${t.id}')">
      <div>
        <div class="todo-text">${t.title}</div>
        ${t.category ? `<div class="todo-category">${t.category}</div>` : ''}
      </div>
      <span class="todo-priority priority-${t.priority}">${t.priority}</span>
      <div class="card-actions">
        <button onclick="openModal('todo','${t.id}')">✏</button>
        <button onclick="deleteItem('todos','${t.id}','todos',renderTodos)">✕</button>
      </div>
    </div>`).join('');
}

function render() { renderNotes(); renderBooks(); renderMovies(); renderTodos(); }

// ─── INIT ─────────────────────────────────────────────────────────────────────
const d = new Date();
document.getElementById('header-date').textContent =
  d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
renderNotes(); renderBooks(); renderTodos();
loadMoviesFromNotion();
</script>
</body>
</html>
